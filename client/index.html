<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>AC3 — Cyber Campaign Command</title>
    <meta name="description" content="AC3 — Cyber Campaign Command. Intelligence-driven offensive security platform for adversary emulation, phishing ops, OSINT recon, and vulnerability intelligence." />
    <meta name="keywords" content="offensive security, red team, adversary emulation, phishing campaigns, OSINT, vulnerability intelligence, cyber campaign, penetration testing, threat intelligence, detection engineering" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Serif+JP:wght@700;900&display=swap" rel="stylesheet" />
    <!-- KaTeX CSS from CDN (fonts loaded from CDN instead of bundled, saves 59 files / 1.2MB) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.25/dist/katex.min.css" crossorigin="anonymous" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Only load analytics when env vars are configured
      (function() {
        var endpoint = "%VITE_ANALYTICS_ENDPOINT%";
        var websiteId = "%VITE_ANALYTICS_WEBSITE_ID%";
        if (endpoint && !endpoint.includes('VITE_ANALYTICS') && websiteId && !websiteId.includes('VITE_ANALYTICS')) {
          var s = document.createElement('script');
          s.defer = true;
          s.src = endpoint + '/umami';
          s.setAttribute('data-website-id', websiteId);
          document.head.appendChild(s);
        }
      })();
    </script>
  </body>

</html>
