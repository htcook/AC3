# ─────────────────────────────────────────────────────────────────────────────
# Pull-Sync Workflow for aceofcloud/AC3
# ─────────────────────────────────────────────────────────────────────────────
# Pulls latest code from hcook-aoc/AC3 into aceofcloud/AC3 using raw git
# commands to bypass org-level PAT restrictions on actions/checkout.
#
# REQUIRED SECRETS (set on aceofcloud/AC3):
#   UPSTREAM_PAT — PAT with read access to hcook-aoc/AC3 (scoped to hcook-aoc)
#   REPO_PAT     — PAT with write access to aceofcloud/AC3
#
# Author: Harrison Cook
# ─────────────────────────────────────────────────────────────────────────────

name: Sync from Developer Repo

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Pull from hcook-aoc/AC3
    runs-on: ubuntu-latest

    steps:
      - name: Clone upstream and push to company repo
        env:
          UPSTREAM_PAT: ${{ secrets.UPSTREAM_PAT }}
          REPO_PAT: ${{ secrets.REPO_PAT }}
        run: |
          set -e

          # Configure git
          git config --global user.name "aceofcloud-bot"
          git config --global user.email "devops@aceofcloud.com"

          # Clone the upstream (developer) repo using raw git
          echo "Cloning hcook-aoc/AC3..."
          git clone --mirror "https://x-access-token:${UPSTREAM_PAT}@github.com/hcook-aoc/AC3.git" upstream-mirror

          cd upstream-mirror

          # Push everything to the company repo (force to ensure full sync)
          echo "Pushing to aceofcloud/AC3..."
          git push --mirror --force "https://x-access-token:${REPO_PAT}@github.com/aceofcloud/AC3.git"

          echo "✅ Sync complete"
          echo "Latest commit: $(git log -1 --format='%h %s' main)"
