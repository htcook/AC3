# ─────────────────────────────────────────────────────────────────────────────
# Pull-Sync Workflow for aceofcloud/AC3
# ─────────────────────────────────────────────────────────────────────────────
# Pulls latest code from hcook-aoc/AC3 into aceofcloud/AC3.
#
# REQUIRED SECRETS:
#   UPSTREAM_PAT — Read-only PAT for hcook-aoc/AC3
#
# REQUIRED SETTINGS:
#   aceofcloud/AC3 → Settings → Actions → General → Workflow permissions
#   → Select "Read and write permissions"
#
# Author: Harrison Cook
# ─────────────────────────────────────────────────────────────────────────────

name: Sync from Developer Repo

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Pull from hcook-aoc/AC3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout upstream (developer) repo
        uses: actions/checkout@v4
        with:
          repository: hcook-aoc/AC3
          ref: main
          token: ${{ secrets.UPSTREAM_PAT }}
          fetch-depth: 0

      - name: Push to company repo
        run: |
          git config user.name "aceofcloud-bot"
          git config user.email "devops@aceofcloud.com"

          # Replace origin with the company repo using GITHUB_TOKEN
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/aceofcloud/AC3.git"

          # Push all content from upstream to company repo
          git push origin main --force

          echo "✅ Sync complete"
          echo "Latest commit: $(git log -1 --format='%h %s')"
