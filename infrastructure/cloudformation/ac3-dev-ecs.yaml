AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AC3 Platform — ECS Fargate Dev Environment (Quick Deploy)
  Uses pre-existing IAM roles and cross-account ECR from SharedServices.
  Author: Harrison Cook — AceofCloud (https://aceofcloud.com)
  FedRAMP Controls: CM-7, SC-28, AC-6, AU-6, SI-2

# ─────────────────────────────────────────────────────────────────────────────
# Parameters
# ─────────────────────────────────────────────────────────────────────────────
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Target deployment environment

  ProjectName:
    Type: String
    Default: ac3
    Description: Project identifier used in resource naming

  # ── Networking ──────────────────────────────────────────────────────────────
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the ECS service

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnet IDs for ECS tasks (minimum 2 for HA)

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnet IDs for the ALB

  # ── Container Image ────────────────────────────────────────────────────────
  ImageUri:
    Type: String
    Default: 890319879326.dkr.ecr.us-east-1.amazonaws.com/ace-c3/caldera-dashboard:latest
    Description: Full ECR image URI including tag

  ContainerPort:
    Type: Number
    Default: 8080
    Description: Port the application listens on inside the container

  # ── IAM Roles (Pre-existing) ───────────────────────────────────────────────
  TaskExecutionRoleArn:
    Type: String
    Default: arn:aws:iam::808038814732:role/ac3-dev-ecs-execution-role
    Description: ARN of the ECS task execution role (pulls images, writes logs)

  TaskRoleArn:
    Type: String
    Default: arn:aws:iam::808038814732:role/ac3-dev-app-task-role
    Description: ARN of the ECS task role (application permissions)

  # ── Sizing ──────────────────────────────────────────────────────────────────
  Cpu:
    Type: Number
    Default: 1024
    AllowedValues: [256, 512, 1024, 2048, 4096]
    Description: CPU units for the Fargate task (1024 = 1 vCPU)

  Memory:
    Type: Number
    Default: 4096
    AllowedValues: [512, 1024, 2048, 4096, 8192, 16384]
    Description: Memory (MiB) for the Fargate task

  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 0
    MaxValue: 10
    Description: Desired number of running tasks

  MinCount:
    Type: Number
    Default: 1
    Description: Minimum tasks for auto-scaling

  MaxCount:
    Type: Number
    Default: 3
    Description: Maximum tasks for auto-scaling

  # ── Secrets ─────────────────────────────────────────────────────────────────
  SecretsArnPrefix:
    Type: String
    Default: ''
    Description: >
      ARN prefix for Secrets Manager secrets (e.g., arn:aws:secretsmanager:us-east-1:808038814732:secret:ac3/dev/).
      Leave empty to use environment variables instead.

  KmsKeyArn:
    Type: String
    Default: ''
    Description: KMS key ARN for encrypting logs and secrets (leave empty for AWS managed keys)

  # ── TLS ─────────────────────────────────────────────────────────────────────
  CertificateArn:
    Type: String
    Default: ''
    Description: ACM certificate ARN for HTTPS listener (leave empty for HTTP-only dev)

  DomainName:
    Type: String
    Default: dev.aceofcloud.io
    Description: Domain name for the application

  # ── Database ────────────────────────────────────────────────────────────────
  DatabaseUrl:
    Type: String
    Default: ''
    NoEcho: true
    Description: MySQL connection string (injected as env var if SecretsArnPrefix is empty)

  JwtSecret:
    Type: String
    Default: ''
    NoEcho: true
    Description: JWT signing secret

# ─────────────────────────────────────────────────────────────────────────────
# Conditions
# ─────────────────────────────────────────────────────────────────────────────
Conditions:
  HasCertificate: !Not [!Equals [!Ref CertificateArn, '']]
  HasKmsKey: !Not [!Equals [!Ref KmsKeyArn, '']]
  HasSecretsPrefix: !Not [!Equals [!Ref SecretsArnPrefix, '']]
  IsProd: !Equals [!Ref Environment, prod]

# ─────────────────────────────────────────────────────────────────────────────
# Resources
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ═══════════════════════════════════════════════════════════════════════════
  # CloudWatch Log Group
  # ═══════════════════════════════════════════════════════════════════════════
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ProjectName}-${Environment}'
      RetentionInDays: !If [IsProd, 365, 30]
      KmsKeyId: !If [HasKmsKey, !Ref KmsKeyArn, !Ref 'AWS::NoValue']
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-logs'
        - Key: Environment
          Value: !Ref Environment

  # ═══════════════════════════════════════════════════════════════════════════
  # Security Groups
  # ═══════════════════════════════════════════════════════════════════════════
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectName}-${Environment} ALB — public HTTP/HTTPS ingress'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from internet
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from internet
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: All outbound
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-alb-sg'

  EcsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectName}-${Environment} ECS tasks — ALB ingress only'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          SourceSecurityGroupId: !Ref AlbSecurityGroup
          Description: From ALB only
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: All outbound (DB, APIs, internet via NAT)
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-ecs-sg'

  # ═══════════════════════════════════════════════════════════════════════════
  # Application Load Balancer
  # ═══════════════════════════════════════════════════════════════════════════
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-alb'
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets: !Ref PublicSubnetIds
      LoadBalancerAttributes:
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: 'true'
        - Key: idle_timeout.timeout_seconds
          Value: '120'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-alb'

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-tg'
      Port: !Ref ContainerPort
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckPath: /api/health
      HealthCheckPort: traffic-port
      HealthCheckProtocol: HTTP
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      HealthCheckTimeoutSeconds: 10
      HealthCheckIntervalSeconds: 30
      Matcher:
        HttpCode: '200'
      DeregistrationDelay: 30
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-tg'

  # HTTPS Listener (when certificate is provided)
  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # HTTP → HTTPS Redirect (when certificate is provided)
  HttpRedirectListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            StatusCode: HTTP_301

  # HTTP Listener (dev — no certificate)
  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: !Not [Condition: HasCertificate]
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ═══════════════════════════════════════════════════════════════════════════
  # ECS Cluster
  # ═══════════════════════════════════════════════════════════════════════════
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${ProjectName}-${Environment}'
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Configuration:
        ExecuteCommandConfiguration:
          Logging: OVERRIDE
          LogConfiguration:
            CloudWatchLogGroupName: !Ref LogGroup
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-cluster'

  # ═══════════════════════════════════════════════════════════════════════════
  # ECS Task Definition
  # ═══════════════════════════════════════════════════════════════════════════
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-${Environment}'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      ExecutionRoleArn: !Ref TaskExecutionRoleArn
      TaskRoleArn: !Ref TaskRoleArn
      RuntimePlatform:
        OperatingSystemFamily: LINUX
        CpuArchitecture: X86_64
      ContainerDefinitions:
        - Name: !Sub '${ProjectName}-app'
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: !Sub '${ContainerPort}'
            - Name: NODE_OPTIONS
              Value: !Sub '--max-old-space-size=${Memory} --expose-gc'
            - Name: AWS_REGION
              Value: !Ref 'AWS::Region'
            - Name: CALDERA_BASE_URL
              Value: https://caldera.aceofcloud.io
            - Name: GOPHISH_BASE_URL
              Value: https://137.184.7.224:3333
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD-SHELL
              - !Sub 'curl -f http://localhost:${ContainerPort}/api/health || exit 1'
            Interval: 30
            Timeout: 10
            Retries: 3
            StartPeriod: 60
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-task'

  # ═══════════════════════════════════════════════════════════════════════════
  # ECS Service
  # ═══════════════════════════════════════════════════════════════════════════
  EcsService:
    Type: AWS::ECS::Service
    DependsOn:
      - HttpListener
    Properties:
      ServiceName: !Sub '${ProjectName}-${Environment}-service'
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      EnableExecuteCommand: !If [IsProd, false, true]
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref PrivateSubnetIds
          SecurityGroups:
            - !Ref EcsSecurityGroup
          AssignPublicIp: DISABLED
      LoadBalancers:
        - TargetGroupArn: !Ref TargetGroup
          ContainerName: !Sub '${ProjectName}-app'
          ContainerPort: !Ref ContainerPort
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-service'

  # ═══════════════════════════════════════════════════════════════════════════
  # Auto-Scaling
  # ═══════════════════════════════════════════════════════════════════════════
  ScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: !Ref MaxCount
      MinCapacity: !Ref MinCount
      ResourceId: !Sub 'service/${EcsCluster}/${EcsService.Name}'
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      RoleARN: !Sub 'arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService'

  CpuScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub '${ProjectName}-${Environment}-cpu-scaling'
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  MemoryScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub '${ProjectName}-${Environment}-memory-scaling'
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageMemoryUtilization
        TargetValue: 80.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  # ═══════════════════════════════════════════════════════════════════════════
  # CloudWatch Alarms
  # ═══════════════════════════════════════════════════════════════════════════
  HighCpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-high-cpu'
      AlarmDescription: ECS CPU utilization above 85% for 5 minutes
      Namespace: AWS/ECS
      MetricName: CPUUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Ref EcsCluster
        - Name: ServiceName
          Value: !GetAtt EcsService.Name
      Statistic: Average
      Period: 60
      EvaluationPeriods: 5
      Threshold: 85
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  HighMemoryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-high-memory'
      AlarmDescription: ECS memory utilization above 90% for 5 minutes
      Namespace: AWS/ECS
      MetricName: MemoryUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Ref EcsCluster
        - Name: ServiceName
          Value: !GetAtt EcsService.Name
      Statistic: Average
      Period: 60
      EvaluationPeriods: 5
      Threshold: 90
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  UnhealthyHostAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-unhealthy-hosts'
      AlarmDescription: ALB target group has unhealthy hosts
      Namespace: AWS/ApplicationELB
      MetricName: UnHealthyHostCount
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
        - Name: TargetGroup
          Value: !GetAtt TargetGroup.TargetGroupFullName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 3
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

# ─────────────────────────────────────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────────────────────────────────────
Outputs:
  ClusterName:
    Description: ECS cluster name
    Value: !Ref EcsCluster
    Export:
      Name: !Sub '${ProjectName}-${Environment}-cluster-name'

  ServiceName:
    Description: ECS service name
    Value: !GetAtt EcsService.Name
    Export:
      Name: !Sub '${ProjectName}-${Environment}-service-name'

  TaskDefinitionArn:
    Description: ECS task definition ARN
    Value: !Ref TaskDefinition

  AlbDnsName:
    Description: ALB DNS name
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub '${ProjectName}-${Environment}-alb-dns'

  AlbArn:
    Description: ALB ARN
    Value: !Ref ApplicationLoadBalancer

  TargetGroupArn:
    Description: Target group ARN
    Value: !Ref TargetGroup

  EcsSecurityGroupId:
    Description: ECS security group ID (add to DB inbound rules)
    Value: !Ref EcsSecurityGroup
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ecs-sg-id'

  LogGroupName:
    Description: CloudWatch log group name
    Value: !Ref LogGroup

  ServiceUrl:
    Description: Application URL
    Value: !If
      - HasCertificate
      - !Sub 'https://${DomainName}'
      - !Sub 'http://${ApplicationLoadBalancer.DNSName}'
