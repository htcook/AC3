version: 1
name: zgrab2
license: Apache-2.0
recommended_modes: ["passive","active-low"]
notes:
  - Use zgrab2 for protocol metadata and banner/tls collection.
  - Avoid collecting full response bodies; store only fingerprints + extracted fields.

config:
  modules:
    - http
    - tls
    - smtp
    - ssh
  output:
    normalize:
      extract:
        - server_banner
        - tls_cert_subject
        - tls_cert_issuer
        - tls_not_after
        - supported_protocols
      fingerprints:
        - response_hash

emission:
  scanner:
    name: zgrab2
    adapter: zgrab2-wrapper
