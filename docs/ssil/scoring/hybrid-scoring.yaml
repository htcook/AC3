version: 1
title: Hybrid Risk Scoring (CARVER+SHOCK × CVSS × BIA)
description: >
  Guidance for fusing technical severity (CVSS), operational impact (CARVER+SHOCK),
  and mission criticality (Auto-BIA) into a single explainable risk score.

weights:
  cvss: 0.40
  carver: 0.40
  bia: 0.20

confidence:
  apply_confidence_weight: true
  floor: 0.30

carver_mapping:
  auth_surface:
    carver_components:
      criticality: 8
      accessibility: 7
      recoverability: 6
      vulnerability: 7
      effect: 8
      shock: 6
  tls_hygiene:
    carver_components:
      criticality: 3
      accessibility: 5
      recoverability: 7
      vulnerability: 3
      effect: 3
      shock: 2
  dns_takeover:
    carver_components:
      criticality: 6
      accessibility: 8
      recoverability: 5
      vulnerability: 7
      effect: 7
      shock: 6

score_formula:
  description: final_score = (cvss*w1 + carver*w2 + bia*w3) * confidence
  clamp_min: 0
  clamp_max: 10

outputs:
  - risk_card: schema/risk_card.schema.json
