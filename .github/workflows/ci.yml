# CI — Type Check, Test, Build
# =============================
# Runs on every push to main and on pull requests.
# Uses GitHub-hosted runners (ubuntu-latest) for portability across repos.
#
# Author: Harrison Cook — AceofCloud (https://aceofcloud.com)

name: CI — Type Check, Test, Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  # ─────────────────────────────────────────────
  # 1. TypeScript type checking (advisory — does not block test/build)
  # ─────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tsc --noEmit
        run: |
          pnpm check 2>&1 | tee /tmp/tsc-output.txt || true
          ERROR_COUNT=$(grep -c "error TS" /tmp/tsc-output.txt || echo "0")
          echo "::notice::TypeScript errors: $ERROR_COUNT (advisory — does not block CI)"
          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "::warning::$ERROR_COUNT TypeScript errors found. These are pre-existing and tracked for gradual cleanup."
            tail -50 /tmp/tsc-output.txt
          fi

  # ─────────────────────────────────────────────
  # 2. Unit tests with Vitest
  # ─────────────────────────────────────────────
  test:
    name: Vitest Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
        env:
          # Provide minimal env vars so tests can import server modules
          DATABASE_URL: "mysql://test:test@localhost:3306/test"
          JWT_SECRET: "test-secret-for-ci"

  # ─────────────────────────────────────────────
  # 3. Vite client build verification
  # ─────────────────────────────────────────────
  build:
    name: Vite Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build client
        run: npx vite build

      - name: Verify build output
        run: |
          echo "Build artifacts:"
          ls -la dist/public/assets/ | head -20
          echo ""
          echo "Bundle sizes:"
          du -sh dist/public/assets/*.js | sort -rh | head -10

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-build-${{ github.sha }}
          path: dist/public/
          retention-days: 7
