# CI — Type Check, Test, Build
# =============================
# Runs on every push to main and on pull requests.
# Uses GitHub-hosted runners (ubuntu-latest) for portability across repos.
#
# Test Strategy:
# - Unit tests (source-pattern assertions, pure logic): run in CI, should all pass
# - Integration tests (DB, SSH, external services): skipped in CI, run in deployment env
#
# Author: Harrison Cook — AceofCloud (https://aceofcloud.com)

name: CI — Type Check, Test, Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  # ─────────────────────────────────────────────
  # 1. TypeScript type checking (advisory — does not block test/build)
  # ─────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tsc --noEmit
        run: |
          pnpm check 2>&1 | tee /tmp/tsc-output.txt || true
          ERROR_COUNT=$(grep -c "error TS" /tmp/tsc-output.txt || echo "0")
          echo "::notice::TypeScript errors: $ERROR_COUNT (advisory — does not block CI)"
          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "::warning::$ERROR_COUNT TypeScript errors found. These are pre-existing and tracked for gradual cleanup."
            tail -50 /tmp/tsc-output.txt
          fi

  # ─────────────────────────────────────────────
  # 2. Unit tests with Vitest (CI-safe tests only)
  # ─────────────────────────────────────────────
  test:
    name: Vitest Tests (CI-Safe)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CI-safe tests
        run: |
          # Run tests excluding known integration test patterns that require
          # external services (SSH, scan server, GoPhish, live DB)
          npx vitest run \
            --exclude='**/scanforge-connectivity*' \
            --exclude='**/gophish-connection*' \
            --exclude='**/scan-server-ssh*' \
            --reporter=verbose 2>&1 | tee /tmp/test-output.txt
          EXIT_CODE=$?
          # Extract summary
          PASSED=$(grep -oP '\d+(?= passed)' /tmp/test-output.txt | tail -1 || echo "0")
          FAILED=$(grep -oP '\d+(?= failed)' /tmp/test-output.txt | tail -1 || echo "0")
          TOTAL=$((PASSED + FAILED))
          echo "::notice::Test results: $PASSED/$TOTAL passed ($FAILED failed)"
          if [ "$FAILED" -gt 0 ]; then
            echo "::warning::$FAILED tests failed."
            # Show the specific failures
            grep -A3 "FAIL " /tmp/test-output.txt | head -60
          fi
          exit $EXIT_CODE
        env:
          # Provide minimal env vars so tests can import server modules
          DATABASE_URL: "mysql://test:test@localhost:3306/test"
          JWT_SECRET: "test-secret-for-ci"
          SCAN_SERVER_HOST: "127.0.0.1"
          SCAN_SERVER_SSH_KEY: ""
          # Prevent SSH prompts from hanging CI
          GIT_SSH_COMMAND: "ssh -o BatchMode=yes -o ConnectTimeout=5"
          CI: "true"

  # ─────────────────────────────────────────────
  # 3. Vite client build verification (blocking — must pass)
  # ─────────────────────────────────────────────
  build:
    name: Vite Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build client
        run: npx vite build

      - name: Verify build output
        run: |
          echo "Build artifacts:"
          ls -la dist/public/assets/ | head -20
          echo ""
          echo "Bundle sizes:"
          du -sh dist/public/assets/*.js | sort -rh | head -10

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-build-${{ github.sha }}
          path: dist/public/
          retention-days: 7
