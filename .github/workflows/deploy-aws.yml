# ─────────────────────────────────────────────────────────────────────────────
# Deploy to AWS ECS Fargate — Branch-Based Environments
# ─────────────────────────────────────────────────────────────────────────────
# Automatic deployment based on branch:
#   dev     branch → Dev environment
#   staging branch → Staging environment
#   main    branch → Prod environment (requires manual approval)
#
# Also supports manual dispatch to any environment.
# Uses OIDC federation — NO long-lived AWS credentials stored in GitHub.
#
# PREREQUISITES:
#   1. AWS infrastructure provisioned (ECR, ECS, ALB, RDS per environment)
#   2. Repository variables set in GitHub:
#      - AWS_ACCOUNT_ID
#      - AWS_REGION (default: us-east-1)
#   3. GitHub Environments configured: dev, staging, prod
#      - prod environment should have required reviewers for approval gate
#   4. OIDC provider configured in AWS IAM for GitHub Actions
#
# Author: Harrison Cook — AceofCloud (https://aceofcloud.com)
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to AWS

on:
  push:
    branches:
      - dev
      - staging
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

# Prevent concurrent deployments to the same environment
concurrency:
  group: deploy-aws-${{ github.event.inputs.environment || (github.ref_name == 'main' && 'prod') || github.ref_name }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME: ac3
  # Cross-account ECR lives in SharedServices (890319879326)
  ECR_ACCOUNT_ID: '890319879326'
  ECR_REPO_NAME: ace-c3/caldera-dashboard

permissions:
  id-token: write   # OIDC federation
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # Determine target environment from branch
  # ─────────────────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    # Only run from the company repo
    if: github.repository == 'hcook-aoc/AC3'
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      ecr_repo: ${{ steps.env.outputs.ecr_repo }}
      ecs_cluster: ${{ steps.env.outputs.ecs_cluster }}
      ecs_service: ${{ steps.env.outputs.ecs_service }}
      task_family: ${{ steps.env.outputs.task_family }}
      deploy_role: ${{ steps.env.outputs.deploy_role }}
      app_domain: ${{ steps.env.outputs.app_domain }}

    steps:
      - name: Determine environment from branch or input
        id: env
        run: |
          # Manual dispatch takes priority
          if [ -n "${{ github.event.inputs.environment }}" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            ENV="prod"
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            ENV="staging"
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            ENV="dev"
          else
            echo "::error::Unknown branch ${{ github.ref_name }} — no environment mapping"
            exit 1
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          # ECR repo is shared across environments in SharedServices account
          echo "ecr_repo=${{ env.ECR_REPO_NAME }}" >> $GITHUB_OUTPUT
          echo "ecs_cluster=${{ env.PROJECT_NAME }}-${ENV}" >> $GITHUB_OUTPUT
          echo "ecs_service=${{ env.PROJECT_NAME }}-${ENV}-service" >> $GITHUB_OUTPUT
          echo "task_family=${{ env.PROJECT_NAME }}-${ENV}" >> $GITHUB_OUTPUT
          echo "deploy_role=arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT_NAME }}-${ENV}-github-deploy" >> $GITHUB_OUTPUT

          # Domain mapping
          case "$ENV" in
            dev)     echo "app_domain=dev.aceofcloud.io" >> $GITHUB_OUTPUT ;;
            staging) echo "app_domain=staging.aceofcloud.io" >> $GITHUB_OUTPUT ;;
            prod)    echo "app_domain=aceofcloud.io" >> $GITHUB_OUTPUT ;;
          esac

          echo "🎯 Deploying to: $ENV (branch: ${{ github.ref_name }})"

  # ─────────────────────────────────────────────
  # Run CI checks before deploy
  # ─────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CI-safe tests
        run: |
          npx vitest run \
            --exclude='**/scanforge-connectivity*' \
            --exclude='**/gophish-connection*' \
            --exclude='**/scan-server-ssh*' \
            --reporter=verbose 2>&1 | tee /tmp/test-output.txt
        env:
          DATABASE_URL: "mysql://test:test@localhost:3306/test"
          JWT_SECRET: "test-secret-for-ci"
          SCAN_SERVER_HOST: "127.0.0.1"
          SCAN_SERVER_SSH_KEY: ""
          CI: "true"

      - name: Build verification
        run: npx vite build

  # ─────────────────────────────────────────────
  # Pre-flight AWS permission validation
  # ─────────────────────────────────────────────
  preflight:
    name: AWS Preflight (${{ needs.setup.outputs.environment }})
    needs: [setup]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.setup.outputs.deploy_role }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run preflight permission checks
        env:
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
          ECR_ACCOUNT_ID: ${{ env.ECR_ACCOUNT_ID }}
          ECR_REPO_NAME: ${{ env.ECR_REPO_NAME }}
        run: |
          chmod +x infrastructure/scripts/preflight-check.sh
          ./infrastructure/scripts/preflight-check.sh --env "$ENVIRONMENT" --verbose

      - name: Verify ECR repository access
        run: |
          echo "🔍 Verifying cross-account ECR access..."
          aws ecr describe-repositories \
            --registry-id "${{ env.ECR_ACCOUNT_ID }}" \
            --repository-names "${{ env.ECR_REPO_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'repositories[0].repositoryUri' \
            --output text
          echo "✅ ECR repository accessible"

      - name: Verify ECS cluster exists
        run: |
          echo "🔍 Verifying ECS cluster..."
          CLUSTER_STATUS=$(aws ecs describe-clusters \
            --clusters "${{ needs.setup.outputs.ecs_cluster }}" \
            --query 'clusters[0].status' \
            --output text 2>/dev/null || echo "MISSING")
          if [ "$CLUSTER_STATUS" = "ACTIVE" ]; then
            echo "✅ ECS cluster ${{ needs.setup.outputs.ecs_cluster }} is ACTIVE"
          else
            echo "::warning::ECS cluster ${{ needs.setup.outputs.ecs_cluster }} status: $CLUSTER_STATUS"
            echo "::warning::Cluster may need to be created before first deploy"
          fi

  # ─────────────────────────────────────────────
  # Build, push, and deploy
  # ─────────────────────────────────────────────
  deploy:
    name: Build & Deploy (${{ needs.setup.outputs.environment }})
    needs: [setup, ci-gate, preflight]
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.setup.outputs.deploy_role }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR (cross-account to SharedServices)
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ env.ECR_ACCOUNT_ID }}

      - name: Build, tag, and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ needs.setup.outputs.ecr_repo }}
          IMAGE_TAG: sha-${{ github.sha }}
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
        run: |
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          LATEST_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          ENV_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${ENVIRONMENT}"

          echo "Building image: $FULL_IMAGE"
          docker build \
            -f Dockerfile.aws \
            --build-arg NODE_ENV=production \
            --build-arg BUILD_SHA=${{ github.sha }} \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -t "$FULL_IMAGE" \
            -t "$LATEST_IMAGE" \
            -t "$ENV_IMAGE" \
            .

          echo "Pushing to ECR..."
          docker push "$FULL_IMAGE"
          docker push "$LATEST_IMAGE" 2>/dev/null || echo "::notice::Latest tag skipped (immutable tags)"
          docker push "$ENV_IMAGE" 2>/dev/null || echo "::notice::Env tag skipped (immutable tags)"

          echo "image=$FULL_IMAGE" >> $GITHUB_OUTPUT
          echo "✅ Image pushed: $FULL_IMAGE"

      - name: Download current task definition
        id: task-def
        env:
          ECS_CLUSTER: ${{ needs.setup.outputs.ecs_cluster }}
          ECS_SERVICE: ${{ needs.setup.outputs.ecs_service }}
        run: |
          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --query 'taskDefinition' \
            > task-definition.json

          echo "task_def_arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT
          echo "📋 Current task definition: $TASK_DEF_ARN"

      - name: Update task definition with new image
        id: new-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.PROJECT_NAME }}-app
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.new-task-def.outputs.task-definition }}
          service: ${{ needs.setup.outputs.ecs_service }}
          cluster: ${{ needs.setup.outputs.ecs_cluster }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      - name: Run database migrations
        env:
          ECS_CLUSTER: ${{ needs.setup.outputs.ecs_cluster }}
          TASK_FAMILY: ${{ needs.setup.outputs.task_family }}
        run: |
          echo "🗄️ Running database migrations..."
          # Run migrations as a one-off ECS task
          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$TASK_FAMILY" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=${{ vars.PRIVATE_SUBNETS }},securityGroups=${{ vars.APP_SG }},assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"${{ env.PROJECT_NAME }}-app","command":["node","node_modules/.bin/drizzle-kit","migrate"]}]}' \
            --query 'tasks[0].taskArn' \
            --output text 2>/dev/null || echo "")

          if [ -n "$TASK_ARN" ] && [ "$TASK_ARN" != "None" ]; then
            echo "Migration task: $TASK_ARN"
            aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" || true
            echo "✅ Migrations complete"
          else
            echo "::notice::Migration task skipped (no task ARN returned — may need manual migration)"
          fi

      - name: Verify deployment
        env:
          ECS_CLUSTER: ${{ needs.setup.outputs.ecs_cluster }}
          ECS_SERVICE: ${{ needs.setup.outputs.ecs_service }}
        run: |
          echo "🔍 Checking service status..."
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].{status:status,runningCount:runningCount,desiredCount:desiredCount,deployments:deployments[*].{status:status,runningCount:runningCount,desiredCount:desiredCount,rolloutState:rolloutState}}' \
            --output table

          echo ""
          echo "✅ Deployment complete for ${{ needs.setup.outputs.environment }}"

  # ─────────────────────────────────────────────
  # Post-deployment smoke test
  # ─────────────────────────────────────────────
  smoke-test:
    name: Smoke Test (${{ needs.setup.outputs.environment }})
    needs: [setup, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.setup.outputs.deploy_role }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ALB DNS
        id: alb
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names "${{ env.PROJECT_NAME }}-${{ needs.setup.outputs.environment }}-alb" \
            --query 'LoadBalancers[0].DNSName' \
            --output text 2>/dev/null || echo "")

          if [ -z "$ALB_DNS" ] || [ "$ALB_DNS" = "None" ]; then
            echo "::warning::Could not determine ALB DNS — skipping smoke test"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Health check
        if: steps.alb.outputs.skip != 'true'
        run: |
          ALB_DNS="${{ steps.alb.outputs.alb_dns }}"
          echo "🏥 Health check: https://${ALB_DNS}/api/health"

          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${ALB_DNS}/api/health" || echo "000")
            echo "  Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            sleep 10
          done

          echo "::warning::Health check did not return 200 after 5 attempts"

      - name: API smoke test
        if: steps.alb.outputs.skip != 'true'
        run: |
          ALB_DNS="${{ steps.alb.outputs.alb_dns }}"
          echo "🧪 API smoke test..."

          # Test tRPC endpoint
          TRPC_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${ALB_DNS}/api/trpc/health" || echo "000")
          echo "  tRPC health: HTTP $TRPC_STATUS"

          # Test static assets
          STATIC_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${ALB_DNS}/" || echo "000")
          echo "  Static assets: HTTP $STATIC_STATUS"

          if [ "$TRPC_STATUS" = "200" ] && [ "$STATIC_STATUS" = "200" ]; then
            echo "✅ All smoke tests passed"
          else
            echo "::warning::Some smoke tests failed"
          fi

  # ─────────────────────────────────────────────
  # Notify on deployment
  # ─────────────────────────────────────────────
  notify:
    name: Notify
    needs: [setup, deploy, smoke-test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment summary
        run: |
          ENV="${{ needs.setup.outputs.environment }}"
          DOMAIN="${{ needs.setup.outputs.app_domain }}"
          STATUS="${{ needs.deploy.result }}"

          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | **${ENV}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Domain | ${DOMAIN} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Status | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Test | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
