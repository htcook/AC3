# ─────────────────────────────────────────────────────────────────────────────
# Push-to-Company Workflow (runs on hcook-aoc/AC3)
# ─────────────────────────────────────────────────────────────────────────────
# Pushes the latest code from hcook-aoc/AC3 to aceofcloud/AC3 on every push
# to main, daily at 06:00 UTC, or on manual trigger.
#
# REQUIRED SECRET on hcook-aoc/AC3:
#   ACEOFCLOUD_PAT — PAT with write access to aceofcloud/AC3
#
# Author: Harrison Cook
# ─────────────────────────────────────────────────────────────────────────────

name: Push to AceofCloud Repo

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

# Only run from hcook-aoc/AC3, not from other mirrors
jobs:
  push-to-company:
    name: Push to aceofcloud/AC3
    runs-on: ubuntu-latest
    if: github.repository == 'hcook-aoc/AC3'

    steps:
      - name: Checkout this repo (hcook-aoc/AC3)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to aceofcloud/AC3
        run: |
          git remote add company "https://x-access-token:${{ secrets.ACEOFCLOUD_PAT }}@github.com/aceofcloud/AC3.git"
          git push company main --force
          echo "✅ Pushed to aceofcloud/AC3"
          echo "Latest commit: $(git log -1 --format='%h %s')"
