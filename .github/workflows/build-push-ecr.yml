# ─────────────────────────────────────────────────────────────────────────────
# Build & Push to ECR — One-time / Manual Trigger
# ─────────────────────────────────────────────────────────────────────────────
# Simplified workflow that builds the Docker image and pushes to ECR.
# Uses AWS credentials stored as GitHub repository secrets.
#
# Required GitHub Secrets:
#   - AWS_ACCESS_KEY_ID
#   - AWS_SECRET_ACCESS_KEY
#   - AWS_SESSION_TOKEN (optional, for temporary credentials)
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Push to ECR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (default: git SHA)"
        required: false
        default: ""

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "808038814732"
  ECR_REPO: ac3/caldera-dashboard

jobs:
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG=$(echo "${{ github.sha }}" | cut -c1-8)
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "🏷️ Image tag: $TAG"

      - name: Build Docker image
        run: |
          IMAGE="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}"
          docker build \
            -f Dockerfile.aws \
            --build-arg BUILD_SHA=${{ github.sha }} \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -t "$IMAGE:${{ steps.tag.outputs.tag }}" \
            -t "$IMAGE:latest" \
            .
          echo "image_uri=$IMAGE:${{ steps.tag.outputs.tag }}" >> $GITHUB_ENV

      - name: Push to ECR
        run: |
          IMAGE="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}"
          docker push "$IMAGE:${{ steps.tag.outputs.tag }}"
          docker push "$IMAGE:latest"
          echo "✅ Pushed: $IMAGE:${{ steps.tag.outputs.tag }}"
          echo "✅ Pushed: $IMAGE:latest"

      - name: Output image URI
        run: |
          echo "## 🐳 Docker Image Pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.image_uri }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ steps.tag.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **ECR Repo** | \`${{ env.ECR_REPO }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Region** | \`${{ env.AWS_REGION }}\` |" >> $GITHUB_STEP_SUMMARY
