name: Pre-build Client Assets

# Runs after CI passes on main — rebuilds .client-assets/ and commits
# so the Manus sandbox never needs to run Vite build (avoids OOM).
on:
  workflow_run:
    workflows: ["CI — Type Check, Test, Build"]
    types: [completed]
    branches: [main]

  # Manual trigger for on-demand rebuilds
  workflow_dispatch:

concurrency:
  group: prebuild-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  prebuild:
    name: Rebuild .client-assets
    runs-on: self-hosted
    timeout-minutes: 30
    # Only run if CI passed (or manual trigger)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history for commit/push
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build client bundle
        run: |
          cd client
          npx vite build --outDir ../dist/public
          echo "✅ Vite build complete"

      - name: Generate build manifest
        run: |
          echo "{" > dist/public/.build-manifest.json
          echo "  \"builtAt\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"," >> dist/public/.build-manifest.json
          echo "  \"commit\": \"${{ github.sha }}\"," >> dist/public/.build-manifest.json
          echo "  \"ref\": \"${{ github.ref }}\"" >> dist/public/.build-manifest.json
          echo "}" >> dist/public/.build-manifest.json
          cat dist/public/.build-manifest.json

      - name: Update .client-assets
        run: |
          # Remove old assets
          rm -rf .client-assets
          # Copy new build
          cp -r dist/public .client-assets
          echo "✅ .client-assets updated"
          echo ""
          echo "Asset summary:"
          ls -la .client-assets/assets/ | head -20
          echo ""
          echo "Total size:"
          du -sh .client-assets/

      - name: Commit and push .client-assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .client-assets/
          
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to .client-assets — skipping commit"
          else
            CHANGED=$(git diff --cached --stat | tail -1)
            git commit -m "chore: rebuild .client-assets [skip ci]

Built from ${{ github.sha }}
Changes: ${CHANGED}"
            git push
            echo "✅ .client-assets committed and pushed"
          fi
