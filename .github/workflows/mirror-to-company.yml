# Mirror to Company Repository
# =============================
# This workflow automatically pushes every commit on `main` to your company's
# private Git repository, keeping both repos in sync.
#
# SETUP (3 steps):
#   1. Replace COMPANY_REPO_URL below with your company's repo URL
#      (HTTPS format: https://github.com/your-company/repo-name.git)
#      (SSH format:   git@github.com:your-company/repo-name.git)
#   2. Replace COMPANY_BRANCH below with the target branch (e.g., main, develop)
#   3. Add a repository secret named COMPANY_PAT:
#      → Go to your GitHub repo → Settings → Secrets and variables → Actions
#      → New repository secret → Name: COMPANY_PAT → Value: your company PAT
#
# The PAT needs `repo` scope (GitHub) or `write_repository` scope (GitLab).
# For Bitbucket, use an App Password with Repositories Write permission.
#
# Author: Harrison Cook — AceofCloud (https://aceofcloud.com)

name: Mirror to Company Repo

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from Actions tab

env:
  # ──────────────────────────────────────────────────────────
  # TODO: Replace these two placeholders with your values
  # ──────────────────────────────────────────────────────────
  COMPANY_REPO_URL: "https://github.com/YOUR-COMPANY/YOUR-REPO.git"
  COMPANY_BRANCH: "main"

jobs:
  mirror:
    name: Push to Company Repo
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "Manus Mirror Bot"
          git config user.email "mirror-bot@aceofcloud.com"

      - name: Add company remote and push
        env:
          COMPANY_PAT: ${{ secrets.COMPANY_PAT }}
        run: |
          # Inject PAT into the HTTPS URL for authentication
          # Supports GitHub, GitLab, Bitbucket, and Azure DevOps HTTPS URLs
          AUTHED_URL=$(echo "$COMPANY_REPO_URL" | sed "s|https://|https://x-access-token:${COMPANY_PAT}@|")

          git remote add company "$AUTHED_URL"
          git push company HEAD:refs/heads/$COMPANY_BRANCH --force

          echo "✅ Successfully mirrored to company repo ($COMPANY_BRANCH branch)"

      - name: Cleanup remote (security)
        if: always()
        run: git remote remove company 2>/dev/null || true
