# Mirror to Company Repository
# =============================
# This workflow automatically pushes every commit on `main` to the company's
# private Git repository (hcook-aoc/AC3), keeping both repos in sync.
#
# PREREQUISITE:
#   Add a repository secret named COMPANY_PAT in BOTH repos:
#   → GitHub repo → Settings → Secrets and variables → Actions
#   → New repository secret → Name: COMPANY_PAT → Value: your company PAT
#
# The PAT needs `repo` + `workflow` scopes.
#
# NOTE: The Manus sandbox also has dual-push configured on the user_github
# remote, so this workflow serves as a backup sync mechanism for pushes
# that originate outside the sandbox (e.g., direct GitHub edits, other CI).
#
# Author: Harrison Cook — AceofCloud (https://aceofcloud.com)

name: Mirror to Company Repo

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  COMPANY_REPO_URL: "https://github.com/hcook-aoc/AC3.git"
  COMPANY_BRANCH: "main"

jobs:
  mirror:
    name: Push to Company Repo
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run from the personal repo (htcook/caldera-dashboard), not from AC3 itself
    if: github.repository == 'htcook/caldera-dashboard'

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "AC3 Mirror Bot"
          git config user.email "mirror-bot@aceofcloud.com"

      - name: Add company remote and push
        env:
          COMPANY_PAT: ${{ secrets.COMPANY_PAT }}
        run: |
          if [ -z "$COMPANY_PAT" ]; then
            echo "::warning::COMPANY_PAT secret not set — skipping mirror"
            exit 0
          fi

          AUTHED_URL=$(echo "$COMPANY_REPO_URL" | sed "s|https://|https://x-access-token:${COMPANY_PAT}@|")

          git remote add company "$AUTHED_URL"
          git push company HEAD:refs/heads/$COMPANY_BRANCH --force

          echo "✅ Successfully mirrored to company repo ($COMPANY_BRANCH branch)"

      - name: Cleanup remote (security)
        if: always()
        run: git remote remove company 2>/dev/null || true
