name: Build & Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: registry.digitalocean.com
  REGISTRY_NAME: ace-c3-registry
  IMAGE_NAME: ace-c3
  APP_ID: 30f972fa-3c51-4a8d-baed-92a696303a50
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only deploy to DO from the personal repo (company repo deploys to AWS)
    if: github.repository == 'htcook/caldera-dashboard'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build Docker image
        run: |
          echo "Building Docker image (includes fresh Vite build)..."
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      - name: Verify no stale assets in image
        run: |
          # Quick sanity check: ensure the image was built with fresh assets
          CID=$(docker create ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:latest)
          docker cp "$CID:/usr/src/app/dist/public/index.html" /tmp/index.html
          docker rm "$CID"
          echo "Build verification: index.html exists"
          head -5 /tmp/index.html

      - name: Push Docker image to DOCR
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Trigger DO App Platform deployment
        run: |
          doctl apps create-deployment ${{ env.APP_ID }} --wait --force-rebuild

      - name: Verify deployment
        run: |
          echo "Deployment triggered for app ${{ env.APP_ID }}"
          doctl apps list --format ID,Spec.Name,DefaultIngress
